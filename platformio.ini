; PlatformIO Project Configuration
; CYD Games — ESP32-2432S028 (Cheap Yellow Display)

[env:esp32-2432S028]
platform  = espressif32@6.9.0
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 115200
board_build.partitions = partitions.csv

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.3.11
    ayushsharma82/ElegantOTA@^3.1.0
    bblanchon/ArduinoJson@^6.21.5
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
    ; ── LVGL ──
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_TICK_PERIOD_MS=5
    -I${PROJECT_DIR}

    ; ── TFT_eSPI: ILI9341 on HSPI ──
    -DUSER_SETUP_LOADED=1
    -DILI9341_2_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DUSE_HSPI_PORT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1

    ; ── XPT2046 Touch (software SPI via TFT_eSPI) ──
    -DTOUCH_CS=33
    -DTOUCH_CLK=25
    -DTOUCH_DIN=32
    -DTOUCH_DO=39
    -DTOUCH_IRQ=36

    ; ── ElegantOTA sync mode ──
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=0

    ; ── Build info ──
    -DFW_VERSION=\"2.4.0\"

build_src_filter =
    +<*>
    +<hal/>
    +<net/>
    +<ui/>
    +<games/>
    +<games/tictactoe/>
    +<games/snake/>
    +<games/memory_match/>
    +<games/pong/>
    +<games/connect4/>
    +<games/dots_boxes/>
    +<games/checkers/>
    +<games/chess/>
    +<games/anagram/>
    +<games/whack_mole/>
    +<games/cup_pong/>
    +<games/sudoku/>
    +<games/pictionary/>
